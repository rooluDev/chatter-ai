spring:
    profiles:
        active: local

    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false
        properties:
            hibernate:
                format_sql: true
                default_batch_fetch_size: 100

    websocket:
        allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}

    servlet:
        multipart:
            max-file-size: 20MB
            max-request-size: 110MB

    data:
        redis:
            host: ${REDIS_HOST:localhost}
            port: ${REDIS_PORT:6379}

server:
    port: 8080

jwt:
    access-token-expiry: 1800000
    refresh-token-expiry: 604800

file:
    upload-dir: ./uploads
    serve-path: /api/files/uploads/**

ai:
    daily-usage-limit: 20
    timeout-seconds: 10
    context-message-count: 10

cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

logging:
    level:
        com.chatterai: INFO
        org.springframework.web.socket: INFO
        org.springframework.messaging: INFO
